<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimatum Finance NEON RED</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #000; --card: rgba(255, 255, 255, 0.05); --green: #00ffa3; --red: #ff3355; --accent: #00a2ff; --grad: none; }
        body.theme-oled { --bg: #000; --accent: #00a2ff; --grad: none; }
        body.theme-cyber { --bg: #05000a; --accent: #bc00ff; --grad: linear-gradient(135deg, #1a0033 0%, #000 100%); }
        body.theme-sea { --bg: #000814; --accent: #00f2ff; --grad: radial-gradient(circle at top, #001d3d 0%, #000 100%); }

        body { 
            background-color: var(--bg); background-image: var(--grad); background-attachment: fixed;
            color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; min-height: 100vh;
        }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; padding-bottom: 180px; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 20px; margin-bottom: 20px; 
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card.full { grid-column: span 2; }
        .stat-card h4 { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 5px 0 0 0; font-size: 1.3rem; font-weight: 800; font-family: 'JetBrains Mono'; }
        
        .nav-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        button, select { 
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px 15px; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 10px;
        }
        .days-grid { display: grid; gap: 8px; grid-template-columns: repeat(7, 1fr); }
        @media (max-width: 600px) { .days-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .day-box { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); 
            aspect-ratio: 1/1; border-radius: 18px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;
            transition: border 0.3s, background 0.3s;
        }
        
        /* Цвета ячеек */
        .day-box.has-plus { border-color: var(--green); background: rgba(0, 255, 163, 0.05); }
        .day-box.has-minus { border-color: var(--red); background: rgba(255, 51, 85, 0.05); }
        
        .day-profit { font-weight: 800; font-size: 0.75rem; font-family: 'JetBrains Mono'; transition: 0.3s; }
        
        body.ghost-mode .blur-target, 
        body.ghost-mode .day-profit, 
        body.ghost-mode #stat-goal-perc { 
            filter: blur(15px); pointer-events: none; user-select: none;
        }

        .progress-bar { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 1.2s ease; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #000; width: 85%; max-width: 320px; padding: 25px; border-radius: 30px; border: 1px solid #333; }
        input { width: 100%; background: #111; border: 1px solid #222; color: white; padding: 15px; border-radius: 12px; margin: 10px 0; box-sizing: border-box; font-family: 'JetBrains Mono'; }
        
        .bot-promo-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .bot-btn { display: block; background: #00a2ff; color: white; text-align: center; padding: 16px; border-radius: 20px; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body class="theme-oled">
    <div id="particles-js"></div>
    <div class="container" id="report-area">
        <div class="glass-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>МЕСЯЦ</h4>
                    <p id="stat-total" class="blur-target">0.0</p>
                </div>
                <div class="stat-card">
                    <h4>ИТОГ ГОДА</h4>
                    <p id="stat-year" class="blur-target">0.0</p>
                </div>
                <div class="stat-card full">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800;">
                        <span>ЦЕЛЬ МЕСЯЦА</span>
                        <span id="stat-goal-perc">0%</span>
                    </div>
                    <div class="progress-bar"><div id="goal-bar" class="progress-fill"></div></div>
                </div>
            </div>
            <div class="nav-controls">
                <select id="sel-year" onchange="render()"></select>
                <select id="sel-month" onchange="render()"></select>
                <button onclick="takeScreenshot()">📸 ОТЧЕТ</button>
                <button onclick="openSettings()">⚙️</button>
                <button onclick="toggleGhost()">👻</button>
            </div>
        </div>
        <h2 id="month-display" style="text-align:center; font-size:11px; letter-spacing:4px; text-transform:uppercase; opacity:0.5;"></h2>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="bot-promo-wrap">
        <a href="http://t.me/DashBoardMoney_bot" class="bot-btn">БОТ ДЛЯ ЗАРАБОТКА 💸</a>
    </div>

    <div class="modal" id="modal-entry">
        <div class="modal-content">
            <h3 id="modal-date-title" style="margin:0">Дата</h3>
            <input type="number" id="in-val" placeholder="Сумма" step="0.1" inputmode="decimal">
            <button onclick="saveEntry()" style="background:var(--accent); color:black; width:100%; border-radius:12px; font-weight:800; border:none; padding:15px; margin-top:10px;">СОХРАНИТЬ</button>
            <button onclick="closeModals()" style="background:transparent; color:#444; width:100%; border:none; margin-top:10px;">ОТМЕНА</button>
        </div>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h3 style="margin-top:0">Параметры</h3>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <label style="font-size:11px; font-weight:600;">ЗВУК КАССЫ</label>
                <input type="checkbox" id="set-sound">
            </div>
            <label style="font-size:10px; opacity:0.5;">ВИЗУАЛЬНЫЙ СТИЛЬ</label>
            <select id="set-theme" style="width:100%; margin-bottom:10px;">
                <option value="oled">OLED Black</option>
                <option value="cyber">Cyberpunk</option>
                <option value="sea">Deep Sea</option>
            </select>
            <label style="font-size:10px; opacity:0.5;">ВАЛЮТА (АВТО-ПЕРЕСЧЕТ)</label>
            <select id="set-cur" style="width:100%; margin-bottom:10px;">
                <option value="USD">USD ($)</option>
                <option value="RUB">RUB (₽)</option>
                <option value="EUR">EUR (€)</option>
            </select>
            <label style="font-size:10px; opacity:0.5;">ЦЕЛЬ МЕСЯЦА</label>
            <input type="number" id="set-goal">
            <p id="api-status" style="font-size:8px; color:var(--green); margin-top:10px; text-align:center; opacity:0.6;">API: загрузка...</p>
            <button onclick="updateCfg()" style="background:var(--accent); color:black; width:100%; border-radius:12px; font-weight:800; border:none; padding:15px; margin-top:10px;">ПРИМЕНИТЬ</button>
        </div>
    </div>

    <audio id="snd-cash" src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const STORAGE_ID = 'ult_finance_v9_neon_red';
        let liveRates = { RUB: 95.0, EUR: 0.92, USD: 1.0 };
        
        let db = JSON.parse(localStorage.getItem(STORAGE_ID + '_db')) || {};
        let cfg = JSON.parse(localStorage.getItem(STORAGE_ID + '_cfg')) || { cur: 'USD', goal: 2000, ghost: false, sound: true, theme: 'oled' };
        let activeId = null;
        const monthsRU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

        async function fetchRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if(data && data.rates) {
                    liveRates.RUB = data.rates.RUB;
                    liveRates.EUR = data.rates.EUR;
                    document.getElementById('api-status').innerText = 'Курсы обновлены ✅';
                }
            } catch (e) { document.getElementById('api-status').innerText = 'Ошибка API ⚠️'; }
        }

        function openSettings() {
            document.getElementById('set-sound').checked = cfg.sound;
            document.getElementById('set-theme').value = cfg.theme;
            document.getElementById('set-cur').value = cfg.cur;
            document.getElementById('set-goal').value = cfg.goal;
            document.getElementById('modal-settings').style.display = 'flex';
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function toggleGhost() { cfg.ghost = !cfg.ghost; save(); render(); }
        function save() { 
            localStorage.setItem(STORAGE_ID + '_db', JSON.stringify(db)); 
            localStorage.setItem(STORAGE_ID + '_cfg', JSON.stringify(cfg)); 
        }

        function convert(val, from, to) {
            if (from === to) return val;
            return (val / liveRates[from]) * liveRates[to];
        }

        function updateCfg() {
            const newCur = document.getElementById('set-cur').value;
            if (cfg.cur !== newCur) {
                Object.keys(db).forEach(id => {
                    db[id].val = parseFloat(convert(db[id].val, cfg.cur, newCur).toFixed(1));
                });
                cfg.goal = Math.round(convert(cfg.goal, cfg.cur, newCur));
            }
            cfg.sound = document.getElementById('set-sound').checked;
            cfg.theme = document.getElementById('set-theme').value;
            cfg.cur = newCur;
            cfg.goal = parseFloat(document.getElementById('set-goal').value) || 1000;
            save(); render(); closeModals();
        }

        function animateValue(obj, end, duration) {
            let start = 0;
            let startTimestamp = null;
            const symbols = { USD: '$', RUB: '₽', EUR: '€' };
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = (progress * (end - start) + start).toFixed(1);
                obj.style.color = end < 0 ? 'var(--red)' : 'white';
                obj.innerHTML = current + symbols[cfg.cur];
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function render() {
            const m = parseInt(document.getElementById('sel-month').value);
            const y = parseInt(document.getElementById('sel-year').value);
            const container = document.getElementById('days-container');
            const symbols = { USD: '$', RUB: '₽', EUR: '€' };
            
            document.body.className = `theme-${cfg.theme} ${cfg.ghost ? 'ghost-mode' : ''}`;
            document.getElementById('month-display').innerText = `${monthsRU[m]} ${y}`;
            container.innerHTML = '';

            let mSum = 0, ySum = 0;
            const daysCount = new Date(y, m + 1, 0).getDate();

            Object.keys(db).forEach(id => {
                const val = parseFloat(db[id].val) || 0;
                if(id.startsWith(y)) ySum += val;
                if(id.startsWith(`${y}-${m}-`)) mSum += val;
            });

            animateValue(document.getElementById('stat-total'), mSum, 800);
            animateValue(document.getElementById('stat-year'), ySum, 800);

            for (let d = 1; d <= daysCount; d++) {
                const id = `${y}-${m}-${d}`;
                const val = db[id]?.val || 0;
                const box = document.createElement('div');
                
                // Логика неонового цвета
                let stateClass = '';
                if (val > 0) stateClass = 'has-plus';
                else if (val < 0) stateClass = 'has-minus';
                
                box.className = `day-box ${stateClass}`;
                box.onclick = () => {
                    activeId = id;
                    document.getElementById('modal-date-title').innerText = `${d} ${monthsRU[m]}`;
                    document.getElementById('in-val').value = val || '';
                    document.getElementById('modal-entry').style.display = 'flex';
                };

                let color = 'white';
                if (val > 0) color = 'var(--green)';
                else if (val < 0) color = 'var(--red)';

                box.innerHTML = `<span style="opacity:0.3; font-size:9px;">${d}</span>
                                <span class="day-profit" style="color:${color}">
                                ${val !== 0 ? val.toFixed(1) + symbols[cfg.cur] : ''}</span>`;
                container.appendChild(box);
            }

            const goalP = Math.min(100, (mSum / cfg.goal) * 100);
            document.getElementById('goal-bar').style.width = Math.max(0, goalP) + '%';
            document.getElementById('stat-goal-perc').innerText = Math.floor(goalP) + '%';
        }

        function saveEntry() {
            const val = parseFloat(document.getElementById('in-val').value) || 0;
            db[activeId] = { val: val };
            if(val > 0 && cfg.sound) document.getElementById('snd-cash').play();
            save(); render(); closeModals();
        }

        function takeScreenshot() {
            html2canvas(document.getElementById('report-area'), { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Finance_Report.png`; link.href = canvas.toDataURL(); link.click();
            });
        }

        const ySel = document.getElementById('sel-year');
        for(let y = 2026; y <= 2030; y++) {
            const opt = document.createElement('option'); opt.value = y; opt.innerText = y;
            if(y === new Date().getFullYear()) opt.selected = true;
            ySel.appendChild(opt);
        }

        const mSel = document.getElementById('sel-month');
        monthsRU.forEach((name, i) => {
            const opt = document.createElement('option'); opt.value = i; opt.innerText = name;
            if(i === new Date().getMonth()) opt.selected = true;
            mSel.appendChild(opt);
        });

        particlesJS("particles-js", { "particles": { "number": { "value": 25 }, "opacity": { "value": 0.2 }, "move": { "speed": 0.3 } } });
        fetchRates().then(() => render());
    </script>
</body>
</html>
