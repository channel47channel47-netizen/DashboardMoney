<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimatum Finance Multi-Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* БАЗОВЫЕ ЦВЕТА (ОБЩИЕ) */
        :root { 
            --green: #00ffa3; --red: #ff3355; --text: #fff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        /* ТЕМЫ */
        body.theme-sea { 
            --bg: #000814; --accent: #00f2ff; --card: rgba(0, 242, 255, 0.03); 
            --glass-border: rgba(0, 242, 255, 0.2); --nav-bg: rgba(0, 8, 20, 0.9);
        }
        body.theme-purple { 
            --bg: #0a0014; --accent: #bc00ff; --card: rgba(188, 0, 255, 0.03); 
            --glass-border: rgba(188, 0, 255, 0.2); --nav-bg: rgba(10, 0, 20, 0.9);
        }
        body.theme-black { 
            --bg: #000000; --accent: #ffffff; --card: rgba(255, 255, 255, 0.02); 
            --glass-border: rgba(255, 255, 255, 0.15); --nav-bg: rgba(0, 0, 0, 0.95);
        }

        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden;
        }
        
        body.ghost-active .blur-val { filter: blur(10px) !important; pointer-events: none; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; padding-bottom: 120px; position: relative; z-index: 1; }
        
        .glass-panel { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* РЕКЛАМНЫЙ БЛОК ТГК */
        .promo-tg {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.1), var(--card));
            border: 1px solid var(--accent); border-radius: 20px; padding: 15px;
            margin-bottom: 20px; text-decoration: none; color: var(--text);
            font-weight: 800; font-size: 13px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }
        .promo-tg:active { transform: scale(0.96); opacity: 0.8; }
        .promo-tg span { color: var(--accent); }

        .rates-bar { display: flex; justify-content: space-around; font-size: 10px; font-family: 'JetBrains Mono'; margin-bottom: 15px; opacity: 0.7; }
        .rates-bar b { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); transition: 0.3s; }
        .stat-card.full { grid-column: span 2; }
        .stat-card h4 { margin: 0; font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 5px 0 0 0; font-size: 1.1rem; font-weight: 800; font-family: 'JetBrains Mono'; }

        .progress-container { height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 15px var(--accent); }

        .period-selector { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .period-btn { flex: 1; border: none; background: none; color: var(--text); padding: 10px; font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .period-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .days-grid { display: grid; gap: 8px; grid-template-columns: repeat(7, 1fr); }
        @media (max-width: 600px) { .days-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .day-box { 
            background: var(--card); border: 1px solid var(--glass-border); 
            aspect-ratio: 1/1; border-radius: 15px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.2s;
        }
        .day-box:active { transform: scale(0.9); }
        .day-box.has-plus { border-color: var(--green); }
        .day-box.has-minus { border-color: var(--red); }

        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--nav-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 25px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
            transition: background 0.5s;
        }
        .nav-item { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); text-shadow: 0 0 15px var(--accent); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--bg); width: 85%; max-width: 320px; padding: 25px; border-radius: 30px; border: 1px solid var(--glass-border); }
        
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 12px; margin: 10px 0; box-sizing: border-box; font-family: 'JetBrains Mono'; }
        button, select { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 10px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="theme-sea">
    <div id="particles-js" style="position:fixed; top:0; width:100%; height:100%; z-index:0;"></div>
    
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div class="rates-bar" style="margin:0; flex:1;">
                <span>USDT: <b id="rate-usdt">1.0</b></span>
                <span>EUR: <b id="rate-eur">...</b></span>
                <span>RUB: <b id="rate-rub">...</b></span>
            </div>
            <button onclick="toggleSound()" id="sound-btn" style="margin-right:5px;">🔊</button>
            <button onclick="toggleGhost()">👻</button>
        </div>

        <div id="view-main">
            <div class="glass-panel">
                <div class="stats-grid">
                    <div class="stat-card"><h4>МЕСЯЦ</h4><p id="stat-total" class="blur-val">0.0</p></div>
                    <div class="stat-card"><h4>ЦЕЛЬ</h4><p id="stat-goal-val" class="blur-val">0.0</p></div>
                    <div class="stat-card full">
                        <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800;">
                            <span>ПРОГРЕСС ЦЕЛИ</span>
                            <span id="stat-perc-text">0%</span>
                        </div>
                        <div class="progress-container"><div id="goal-fill" class="progress-fill"></div></div>
                    </div>
                </div>
                <div style="display:flex; gap:8px; margin-top:15px;">
                    <select id="sel-year" onchange="render()" style="flex:1"></select>
                    <select id="sel-month" onchange="render()" style="flex:1"></select>
                </div>
            </div>
            <div class="days-grid" id="days-container"></div>
        </div>

        <div id="view-stats" class="hidden">
            <div class="glass-panel">
                <div class="period-selector">
                    <button class="period-btn active" onclick="setPeriod('week', this)">НЕДЕЛЯ</button>
                    <button class="period-btn" onclick="setPeriod('month', this)">МЕСЯЦ</button>
                    <button class="period-btn" onclick="setPeriod('year', this)">ГОД</button>
                </div>
                <canvas id="mainChart" style="max-height: 180px;"></canvas>
                <div class="stats-grid" style="margin-top:20px;">
                    <div class="stat-card"><h4>ДОХОД</h4><p id="ana-inc" class="blur-val" style="color:var(--green)">0.0</p></div>
                    <div class="stat-card"><h4>РАСХОД</h4><p id="ana-exp" class="blur-val" style="color:var(--red)">0.0</p></div>
                </div>
            </div>
        </div>

        <div id="view-settings" class="hidden">
            <div class="glass-panel">
                <h3>НАСТРОЙКИ</h3>
                
                <!-- РЕКЛАМНЫЙ БЛОК -->
                <a href="https://t.me/PrimeCalOfficial" target="_blank" class="promo-tg">
                    <span>Подписаться на ProfitCal / Новости 📢</span>
                </a>

                <label style="font-size:10px; opacity:0.5;">ЦВЕТОВАЯ ТЕМА</label>
                <select id="set-theme" style="width:100%; margin-bottom:15px;" onchange="updateCfg()">
                    <option value="sea">Deep Sea (Голубой)</option>
                    <option value="black">OLED Black (Черный)</option>
                    <option value="purple">Cyber Purple (Фиолетовый)</option>
                </select>
                <label style="font-size:10px; opacity:0.5;">ВАЛЮТА (АВТО-ПЕРЕСЧЕТ)</label>
                <select id="set-cur" style="width:100%; margin-bottom:15px;" onchange="convertAllData(this.value)">
                    <option value="USD">USD (USDT)</option>
                    <option value="RUB">RUB (₽)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
                <label style="font-size:10px; opacity:0.5;">ЦЕЛЬ</label>
                <input type="number" id="set-goal" step="0.1">
                <button onclick="updateCfg()" style="background:var(--accent); color:black; width:100%; border:none; padding:15px; border-radius:15px; font-weight:800;">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showView('view-main', this)">🗓️</button>
        <button class="nav-item" onclick="showView('view-stats', this)">📊</button>
        <button class="nav-item" onclick="showView('view-settings', this)">⚙️</button>
    </div>

    <div class="modal" id="modal-entry">
        <div class="modal-content">
            <h3 id="modal-date-title" style="margin:0; font-size:14px; color:var(--accent);">Запись</h3>
            <input type="number" id="in-inc" placeholder="Доход (+)" inputmode="decimal" step="0.1">
            <input type="number" id="in-exp" placeholder="Расход (-)" inputmode="decimal" step="0.1">
            <button onclick="saveEntry()" style="background:var(--accent); color:black; width:100%; border:none; padding:15px; border-radius:12px; font-weight:800;">ОК</button>
            <button onclick="closeModals()" style="background:transparent; color:#555; width:100%; border:none; margin-top:10px;">ОТМЕНА</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        let db = JSON.parse(localStorage.getItem('fin_sea_db')) || {};
        let cfg = JSON.parse(localStorage.getItem('fin_sea_cfg')) || { cur: 'USD', goal: 2000, theme: 'sea', sound: true, ghost: false };
        let rates = { RUB: 92.5, EUR: 0.92, USD: 1.0 };
        let activeId = null, myChart = null, currentPeriod = 'week';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() { if(!cfg.sound) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=600; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }

        async function fetchRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json(); rates = data.rates;
                document.getElementById('rate-rub').innerText = rates.RUB.toFixed(1);
                document.getElementById('rate-eur').innerText = (1/rates.EUR).toFixed(2);
            } catch(e) {}
        }

        function initParticles() {
            const colors = { sea: '#00f2ff', purple: '#bc00ff', black: '#ffffff' };
            if (window.pJSDom && window.pJSDom.length > 0) {
                window.pJSDom[0].pJS.fn.vendors.destroypJS();
                window.pJSDom = [];
            }
            particlesJS("particles-js", { "particles": { "number": { "value": 30 }, "color": {"value": colors[cfg.theme]}, "opacity": { "value": 0.2 }, "move": { "speed": 0.6 } } });
        }

        function convertAllData(newCur) {
            const oldCur = cfg.cur;
            const factor = (rates[newCur] || 1) / (rates[oldCur] || 1);
            Object.keys(db).forEach(id => { db[id].inc *= factor; db[id].exp *= factor; });
            cfg.goal *= factor;
            cfg.cur = newCur;
            save(); render(); playTick();
            document.getElementById('set-goal').value = cfg.goal.toFixed(1);
        }

        function render() {
            const m = parseInt(document.getElementById('sel-month').value), y = parseInt(document.getElementById('sel-year').value);
            const container = document.getElementById('days-container');
            const sym = { USD: '$', RUB: '₽', EUR: '€' }[cfg.cur];
            
            document.body.className = `theme-${cfg.theme} ${cfg.ghost ? 'ghost-active' : ''}`;
            container.innerHTML = '';
            let mSum = 0;
            const days = new Date(y, m + 1, 0).getDate();

            for (let d = 1; d <= days; d++) {
                const id = `${y}-${m}-${d}`;
                const data = db[id] || { inc: 0, exp: 0 };
                const profit = data.inc - data.exp;
                mSum += profit;

                const box = document.createElement('div');
                box.className = `day-box ${profit > 0 ? 'has-plus' : profit < 0 ? 'has-minus' : ''}`;
                box.onclick = () => { activeId = id; document.getElementById('in-inc').value = data.inc || ''; document.getElementById('in-exp').value = data.exp || ''; document.getElementById('modal-entry').style.display = 'flex'; playTick(); };
                box.innerHTML = `<span style="font-size:9px; opacity:0.3;">${d}</span><span class="blur-val" style="font-weight:800; font-size:0.65rem; color:${profit>=0?'var(--green)':'var(--red)'}">${profit?profit.toFixed(1)+sym:''}</span>`;
                container.appendChild(box);
            }

            document.getElementById('stat-total').innerText = mSum.toFixed(1) + sym;
            document.getElementById('stat-goal-val').innerText = cfg.goal.toFixed(1) + sym;
            const perc = Math.min(100, Math.max(0, (mSum / cfg.goal) * 100));
            document.getElementById('goal-fill').style.width = perc + '%';
            document.getElementById('stat-perc-text').innerText = Math.floor(perc) + '%';
        }

        function updateStats() {
            let inc = 0, exp = 0;
            const now = new Date();
            Object.keys(db).forEach(id => {
                const [y, m, d] = id.split('-').map(Number);
                const date = new Date(y, m, d);
                let valid = (currentPeriod === 'week' && (now - date) / 86400000 <= 7) || (currentPeriod === 'month' && m === now.getMonth() && y === now.getFullYear()) || (currentPeriod === 'year' && y === now.getFullYear());
                if(valid) { inc += db[id].inc; exp += db[id].exp; }
            });
            document.getElementById('ana-inc').innerText = inc.toFixed(1);
            document.getElementById('ana-exp').innerText = exp.toFixed(1);
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [inc, exp], backgroundColor: ['#00ffa3', '#ff3355'], borderWidth: 0 }] }, options: { cutout: '80%' } });
        }

        function toggleGhost() { cfg.ghost = !cfg.ghost; render(); playTick(); save(); }
        function toggleSound() { cfg.sound = !cfg.sound; document.getElementById('sound-btn').innerText = cfg.sound ? '🔊' : '🔇'; save(); }
        function showView(id, btn) { document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); btn.classList.add('active'); if(id === 'view-stats') updateStats(); playTick(); }
        function saveEntry() { db[activeId] = { inc: parseFloat(document.getElementById('in-inc').value)||0, exp: parseFloat(document.getElementById('in-exp').value)||0 }; save(); render(); closeModals(); playTick(); }
        
        function updateCfg() { 
            cfg.goal = parseFloat(document.getElementById('set-goal').value)||2000; 
            cfg.theme = document.getElementById('set-theme').value;
            save(); 
            initParticles();
            render(); 
            playTick(); 
        }

        function setPeriod(p, btn) { currentPeriod = p; document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); updateStats(); playTick(); }
        function save() { localStorage.setItem('fin_sea_db', JSON.stringify(db)); localStorage.setItem('fin_sea_cfg', JSON.stringify(cfg)); }
        function closeModals() { document.getElementById('modal-entry').style.display = 'none'; }

        // Init
        const yS = document.getElementById('sel-year'), mS = document.getElementById('sel-month');
        for(let y=2026; y<=2030; y++) yS.innerHTML += `<option value="${y}">${y}</option>`;
        for(let i=0; i<12; i++) mS.innerHTML += `<option value="${i}">${i+1}</option>`;
        yS.value = new Date().getFullYear(); mS.value = new Date().getMonth();

        fetchRates().then(() => { 
            document.getElementById('set-theme').value = cfg.theme;
            document.getElementById('set-cur').value = cfg.cur;
            document.getElementById('set-goal').value = cfg.goal.toFixed(1);
            document.getElementById('sound-btn').innerText = cfg.sound ? '🔊' : '🔇';
            initParticles();
            render(); 
        });
    </script>
</body>
</html>
