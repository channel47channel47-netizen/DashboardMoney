<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimatum Finance 2026 | @ThethoughtofDeath</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --card: rgba(20, 20, 20, 0.7);
            --green: #00ffa3;
            --red: #ff3355;
            --accent: #00a2ff;
            --grad: none;
        }

        /* ТЕМЫ */
        body.theme-oled { --bg: #000; --accent: #00a2ff; --grad: none; }
        body.theme-cyber { --bg: #05000a; --accent: #bc00ff; --grad: linear-gradient(135deg, #1a0033 0%, #000 100%); }
        body.theme-sea { --bg: #000814; --accent: #00f2ff; --grad: radial-gradient(circle at top, #001d3d 0%, #000 100%); }
        
        body {
            background-color: var(--bg);
            background-image: var(--grad);
            background-attachment: fixed;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            transition: 0.5s;
            -webkit-tap-highlight-color: transparent;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; position: relative; }

        /* Dashboard */
        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .stat-card h4 { margin: 0; font-size: 0.7rem; text-transform: uppercase; color: #888; }
        .stat-card p { margin: 5px 0; font-size: 1.4rem; font-weight: 800; font-family: 'JetBrains Mono'; }

        /* Навигация */
        .nav-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        select, button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            flex-grow: 1;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); color: black; }

        /* Календарь */
        .days-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(7, 1fr);
        }

        @media (max-width: 992px) { .days-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 480px) { .days-grid { grid-template-columns: repeat(2, 1fr); } }

        .day-box {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            aspect-ratio: 1/1;
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
        }

        .day-box:hover { transform: translateY(-5px); border-color: var(--accent); }
        .day-info { font-size: 0.7rem; color: #666; }
        .day-profit { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 0.95rem; text-align: center; }

        .plus { color: var(--green); text-shadow: 0 0 10px rgba(0,255,163,0.4); }
        .minus { color: var(--red); text-shadow: 0 0 10px rgba(255,51,85,0.4); }

        /* Ghost Mode */
        body.ghost-mode .day-profit { filter: blur(8px); position: relative; }
        body.ghost-mode .day-profit::after { content: "****"; filter: blur(0); position: absolute; left: 0; width: 100%; color: var(--accent); text-align: center; }

        /* Прогресс бар */
        .progress-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s; box-shadow: 0 0 15px var(--accent); }

        /* ТГК Кнопка */
        .tg-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            text-align: center;
        }

        input, textarea, select.modal-select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 16px;
            font-family: 'Montserrat';
        }

        .btn-save { background: var(--accent); color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body class="theme-oled">

    <div id="particles-js"></div>

    <div class="container">
        <!-- Статистика -->
        <div class="glass-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <h4 id="lbl-total">TOTAL BALANCE</h4>
                    <p id="stat-total" class="day-profit">0.00 $</p>
                </div>
                <div class="stat-card">
                    <h4 id="lbl-year">YEAR 2026</h4>
                    <p id="stat-year" class="day-profit">0.00 $</p>
                </div>
                <div class="stat-card">
                    <h4 id="lbl-goal">GOAL PROGRESS</h4>
                    <p id="stat-goal-perc">0%</p>
                    <div class="progress-bg"><div id="goal-bar" class="progress-fill"></div></div>
                </div>
            </div>

            <div class="nav-controls">
                <select id="sel-month" onchange="render()"></select>
                <select id="sel-year" onchange="render()">
                    <option value="2026">2026</option><option value="2027">2027</option>
                    <option value="2028">2028</option><option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
                <button onclick="openSettings()">⚙️</button>
                <button onclick="toggleGhost()">👻</button>
            </div>
        </div>

        <h1 id="month-display" style="text-align:center; font-weight:800;"></h1>
        <div class="days-grid" id="days-container"></div>
    </div>

    <a href="https://t.me/ThethoughtofDeath" class="tg-float" target="_blank">CHANNEL</a>

    <!-- Модалка ввода -->
    <div class="modal" id="modal-entry">
        <div class="modal-content">
            <h3 id="modal-date-title">Date</h3>
            <input type="number" id="in-val" placeholder="0.00" inputmode="decimal">
            <textarea id="in-note" placeholder="Notes..."></textarea>
            <button class="btn-save" onclick="saveEntry()">SAVE</button>
            <button onclick="closeModals()" style="background:transparent; color:#555; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <!-- Модалка настроек -->
    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h2 id="set-title">Settings</h2>
            <label>Currency:</label>
            <select class="modal-select" id="set-cur" onchange="updateCfg()">
                <option value="USD">USD ($)</option><option value="RUB">RUB (₽)</option><option value="EUR">EUR (€)</option>
            </select>
            <label>Language:</label>
            <select class="modal-select" id="set-lang" onchange="updateCfg()">
                <option value="EN">English</option><option value="RU">Русский</option>
            </select>
            <label>Theme:</label>
            <select class="modal-select" id="set-theme" onchange="updateCfg()">
                <option value="oled">OLED Black</option><option value="cyber">Cyberpunk</option><option value="sea">Deep Sea</option>
            </select>
            <label>Monthly Goal:</label>
            <input type="number" id="set-goal" onchange="updateCfg()">
            <button class="btn-save" onclick="closeModals()">CLOSE</button>
        </div>
    </div>

    <audio id="snd-cash" src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        let db = JSON.parse(localStorage.getItem('ult_fin_db')) || {};
        let cfg = JSON.parse(localStorage.getItem('ult_fin_cfg')) || { lang: 'RU', cur: 'USD', theme: 'oled', goal: 1000, ghost: false };
        let rates = { USD: 1, RUB: 92.5, EUR: 0.91 }; 
        let activeId = null;

        const lang = {
            RU: { months: ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"], total: "ОБЩИЙ БАЛАНС", year: "ИТОГИ ГОДА", goal: "ПРОГРЕСС ЦЕЛИ", settings: "Настройки" },
            EN: { months: ["January","February","March","April","May","June","July","August","September","October","November","December"], total: "TOTAL BALANCE", year: "YEAR SUMMARY", goal: "GOAL PROGRESS", settings: "Settings" }
        };

        function openSettings() {
            document.getElementById('set-cur').value = cfg.cur;
            document.getElementById('set-lang').value = cfg.lang;
            document.getElementById('set-theme').value = cfg.theme;
            document.getElementById('set-goal').value = cfg.goal;
            document.getElementById('modal-settings').style.display = 'flex';
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function toggleGhost() { cfg.ghost = !cfg.ghost; save(); render(); }
        function save() { localStorage.setItem('ult_fin_db', JSON.stringify(db)); localStorage.setItem('ult_fin_cfg', JSON.stringify(cfg)); }

        function updateCfg() {
            cfg.cur = document.getElementById('set-cur').value;
            cfg.lang = document.getElementById('set-lang').value;
            cfg.theme = document.getElementById('set-theme').value;
            cfg.goal = parseFloat(document.getElementById('set-goal').value) || 1000;
            save();
            render();
        }

        function render() {
            const m = parseInt(document.getElementById('sel-month').value);
            const y = document.getElementById('sel-year').value;
            const container = document.getElementById('days-container');
            const l = lang[cfg.lang];
            
            document.body.className = `theme-${cfg.theme} ${cfg.ghost ? 'ghost-mode' : ''}`;
            document.getElementById('month-display').innerText = `${l.months[m]} ${y}`;
            document.getElementById('lbl-total').innerText = l.total;
            document.getElementById('lbl-year').innerText = `${l.year} ${y}`;
            document.getElementById('lbl-goal').innerText = l.goal;

            container.innerHTML = '';
            const daysCount = new Date(y, m + 1, 0).getDate();
            let mSum = 0, ySum = 0;

            // Расчет сумм
            Object.keys(db).forEach(id => {
                if(id.startsWith(y)) ySum += db[id].val;
                if(id.startsWith(`${y}-${m}-`)) mSum += db[id].val;
            });

            for (let d = 1; d <= daysCount; d++) {
                const id = `${y}-${m}-${d}`;
                const entry = db[id] || { val: 0, note: '' };
                const box = document.createElement('div');
                box.className = 'day-box';
                box.onclick = () => {
                    activeId = id;
                    document.getElementById('modal-date-title').innerText = `${d} ${l.months[m]}`;
                    document.getElementById('in-val').value = entry.val || '';
                    document.getElementById('in-note').value = entry.note || '';
                    document.getElementById('modal-entry').style.display = 'flex';
                };

                const curS = cfg.cur === 'USD' ? '$' : (cfg.cur === 'RUB' ? '₽' : '€');
                const valDisp = (entry.val * (cfg.cur === 'USD' ? 1 : rates[cfg.cur])).toFixed(2);

                box.innerHTML = `
                    <div class="day-info">${d} ${l.months[m].substring(0,3)}</div>
                    <div class="day-profit ${entry.val > 0 ? 'plus' : (entry.val < 0 ? 'minus' : '')}">
                        ${entry.val !== 0 ? (entry.val > 0 ? '+' : '') + valDisp + curS : ''}
                    </div>
                    <div style="font-size:8px;">${entry.note ? '📝' : ''}</div>
                `;
                container.appendChild(box);
            }

            const mainCurS = cfg.cur === 'USD' ? '$' : (cfg.cur === 'RUB' ? '₽' : '€');
            const totalConv = (mSum * (cfg.cur === 'USD' ? 1 : rates[cfg.cur])).toFixed(2);
            const yearConv = (ySum * (cfg.cur === 'USD' ? 1 : rates[cfg.cur])).toFixed(2);

            document.getElementById('stat-total').innerText = totalConv + ' ' + mainCurS;
            document.getElementById('stat-year').innerText = yearConv + ' ' + mainCurS;
            
            const goalP = Math.min(100, Math.max(0, (mSum / cfg.goal) * 100));
            document.getElementById('goal-bar').style.width = goalP + '%';
            document.getElementById('stat-goal-perc').innerText = Math.floor(goalP) + '%';
        }

        function saveEntry() {
            const v = parseFloat(document.getElementById('in-val').value) || 0;
            const n = document.getElementById('in-note').value;
            db[activeId] = { val: v, note: n };
            if(v > 0) document.getElementById('snd-cash').play();
            save(); render(); closeModals();
        }

        // Инициализация селектора месяцев
        const mSel = document.getElementById('sel-month');
        lang.RU.months.forEach((name, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = name;
            if(i === new Date().getMonth()) opt.selected = true;
            mSel.appendChild(opt);
        });

        particlesJS("particles-js", {
            "particles": { "number": { "value": 50 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.1 }, "size": { "value": 1 }, "line_linked": { "enable": true, "distance": 150, "opacity": 0.05 }, "move": { "enable": true, "speed": 0.5 } }
        });

        render();
    </script>
</body>
</html>
